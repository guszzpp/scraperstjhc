name: Rodar scraper diariamente STJ (Origem TJGO)

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Definir data de ontem
        id: data
        run: |
          ONTEM_DATA=$(date -d 'yesterday' +'%d/%m/%Y')
          echo "ontem=$ONTEM_DATA" >> $GITHUB_OUTPUT

      - name: 🚀 Rodar scraper e preparar e‑mail
        run: |
          echo "Executando main.py para: ${{ steps.data.outputs.ontem }}"
          python main.py "${{ steps.data.outputs.ontem }}"

      - name: 📄 Preparar Dados do E‑mail a Partir de Arquivos
        id: montar_corpo
        run: |
          SUBJECT=$(cat email_subject.txt)
          BODY=$(cat email_body.txt)
          ATTACHMENT=$(cat attachment.txt || echo "")
          echo "email_subject=$SUBJECT" >> $GITHUB_OUTPUT
          echo "email_body<<EOF" >> $GITHUB_ENV
          echo "$BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "attachment_name=$ATTACHMENT" >> $GITHUB_OUTPUT

      - name: 📤 Enviar E‑mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USUARIO }}
          password: ${{ secrets.EMAIL_SENHA }}
          subject: ${{ steps.montar_corpo.outputs.email_subject }}
          body: ${{ env.email_body }}
          to: ${{ secrets.EMAIL_DESTINATARIO_TESTE }}
          from: Automação STJ <${{ secrets.EMAIL_USUARIO }}>
          attachments: ${{ steps.montar_corpo.outputs.attachment_name && format('{0}/{1}', github.workspace, steps.montar_corpo.outputs.attachment_name) || '' }}
