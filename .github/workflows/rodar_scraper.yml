# .github/workflows/pipeline_stjhc.yml

name: Pipeline HCs STJ/TJGO

on:
  schedule:
    - cron: '0 15 * * *'    # Executa diariamente às 15:00 UTC
  workflow_dispatch:       # Permite disparo manual

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  EMAIL_USER: ${{ secrets.EMAIL_USUARIO }}
  EMAIL_PASS: ${{ secrets.EMAIL_SENHA }}
  EMAIL_DESTINATARIO_TESTE: ${{ secrets.EMAIL_DESTINATARIO_TESTE }}

jobs:
  run:
    name: Scraper Diário
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependências
        run: pip install -r requirements.txt

      - name: 📁 Criar pasta dados_diarios
        run: mkdir -p dados_diarios

      - name: 🗂️ Restaurar cache de dados diários
        uses: actions/cache@v3
        with:
          path: dados_diarios
          key: dados-diarios-${{ github.sha }}
          restore-keys: |
            dados-diarios-

      - name: 📅 Obter data de ontem
        id: data_scrape
        run: |
          ONTEM=$(date -d "yesterday" +"%d/%m/%Y")
          ONTEM_FMT=$(date -d "yesterday" +"%d-%m-%Y")
          echo "ontem=$ONTEM" >> $GITHUB_OUTPUT
          echo "ontem_fmt=$ONTEM_FMT" >> $GITHUB_OUTPUT

      - name: 🔍 Executar script principal
        run: python main.py "${{ steps.data_scrape.outputs.ontem }}"

      - name: 🔎 Verificar arquivo gerado
        run: ls -l dados_diarios

      - name: ☁️ Upload condicional para Supabase
        run: |
          ARQ=dados_diarios/hc_tjgo_${{ steps.data_scrape.outputs.ontem_fmt }}.xlsx
          if [[ -f "$ARQ" ]]; then
            python supabase/supabase_upload.py "$ARQ" "hc_tjgo_${{ steps.data_scrape.outputs.ontem_fmt }}.xlsx"
            - run: ls -l dados_diarios
          else
            echo "⏭️ Arquivo não encontrado; pulando upload."
          fi

      - name: 📧 Gerar conteúdo do email
        id: gerar_email
        run: |
          # Subject
          if [ -f "email_subject.txt" ]; then
            echo "email_subject=$(<email_subject.txt)" >> $GITHUB_OUTPUT
          else
            echo "email_subject=Resultados da checagem de HCs STJ/TJGO - ${{ steps.data_scrape.outputs.ontem }}" >> $GITHUB_OUTPUT
          fi

          # Body (mantém quebras de linha)
          if [ -f "email_body.txt" ]; then
            printf "email_body<<EOF\n%s\nEOF\n" "$(cat email_body.txt)" >> $GITHUB_OUTPUT
          else
            echo "email_body=Execução concluída em ${{ steps.data_scrape.outputs.ontem }}. Nenhuma notificação especial gerada." >> $GITHUB_OUTPUT
          fi

          # Attachment
          if [ -f "attachment.txt" ]; then
            echo "attachment_name=$(<attachment.txt)" >> $GITHUB_OUTPUT
          fi

      - name: 📤 Enviar e-mail de status
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USUARIO }}
          password: ${{ secrets.EMAIL_SENHA }}
          subject: "${{ steps.gerar_email.outputs.email_subject }}"
          html_body: "${{ steps.gerar_email.outputs.email_body }}"
          to: ${{ secrets.EMAIL_DESTINATARIO_TESTE }}
          from: "Checagem STJ HC <${{ secrets.EMAIL_USUARIO }}>"
          attachments: ${{ steps.gerar_email.outputs.attachment_name || '' }}

  rechecagem:
    name: Rechecagem Retroativa
    needs: run
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependências
        run: pip install -r requirements.txt

      - name: 📁 Criar pasta dados_diarios
        run: mkdir -p dados_diarios

      - name: 📅 Obter ontem e anteontem
        id: data_recheck
        run: |
          ANTEONTEM=$(date -d "2 days ago" +"%d/%m/%Y")
          ANTEONTEM_FMT=$(date -d "2 days ago" +"%d-%m-%Y")
          echo "anteontem=$ANTEONTEM" >> $GITHUB_OUTPUT
          echo "anteontem_fmt=$ANTEONTEM_FMT" >> $GITHUB_OUTPUT

      - name: ⬇️ Download antecedente
        run: |
          python supabase/supabase_download.py ${{ secrets.SUPABASE_URL }} ${{ secrets.SUPABASE_BUCKET }} hc_tjgo_${{ steps.data_recheck.outputs.anteontem_fmt }}.xlsx dados_diarios/hc_tjgo_${{ steps.data_recheck.outputs.anteontem_fmt }}.xlsx
          
      - name: Debug: listar arquivos em dados_diarios
        run: |
          echo "Conteúdo de dados_diarios:"
          ls -l dados_diarios
          
      - name: 🔄 Executar rechecagem
        run: python retroativos/rechecagem.py "${{ steps.data_recheck.outputs.anteontem }}" "${{ steps.data_recheck.outputs.ontem }}"

      - name: 📋 Criar arquivo de rechecagem
        run: |
          if [ -f tem_divergencia.txt ] && [ "$(cat tem_divergencia.txt)" = "true" ]; then
            cp dados_diarios/hc_tjgo_${{ steps.data_recheck.outputs.ontem_fmt }}.xlsx dados_diarios/rechecagem_hc_tjgo_${{ steps.data_recheck.outputs.ontem_fmt }}.xlsx
          else
            python supabase/criar_xlsx_vazio.py dados_diarios/rechecagem_hc_tjgo_${{ steps.data_recheck.outputs.ontem_fmt }}.xlsx
          fi

      - name: ☁️ Upload de rechecagem
        run: |
          python supabase/supabase_upload.py dados_diarios/rechecagem_hc_tjgo_${{ steps.data_recheck.outputs.ontem_fmt }}.xlsx rechecagem_hc_tjgo_${{ steps.data_recheck.outputs.ontem_fmt }}.xlsx

      - name: Verificar divergência
        id: check_div
        run: |
          if [ -f tem_divergencia.txt ] && [ "$(cat tem_divergencia.txt)" = "true" ]; then
            echo "has_div=true" >> $GITHUB_OUTPUT
          else
            echo "has_div=false" >> $GITHUB_OUTPUT
          fi

      - name: 📧 E-mail de divergência
        if: steps.check_div.outputs.has_div == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USUARIO }}
          password: ${{ secrets.EMAIL_SENHA }}
          subject: "🚨 Divergência na rechecagem - ${{ steps.data_recheck.outputs.ontem }}"
          html_body: |
            <!-- seu HTML de alerta -->
          to: ${{ secrets.EMAIL_DESTINATARIO_TESTE }}
          from: "Rechecagem STJ HC <${{ secrets.EMAIL_USUARIO }}>"
          attachments: dados_diarios/rechecagem_hc_tjgo_${{ steps.data_recheck.outputs.ontem_fmt }}.xlsx

      - name: 📧 E-mail sem divergência
        if: steps.check_div.outputs.has_div != 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USUARIO }}
          password: ${{ secrets.EMAIL_SENHA }}
          subject: "ℹ️ Sem divergências na rechecagem - ${{ steps.data_recheck.outputs.ontem }}"
          html_body: |
            <!-- seu HTML padrão de “sem divergência” -->
          to: ${{ secrets.EMAIL_DESTINATARIO_TESTE }}
          from: "Rechecagem STJ HC <${{ secrets.EMAIL_USUARIO }}>"
          attachments: dados_diarios/rechecagem_hc_tjgo_${{ steps.data_recheck.outputs.ontem_fmt }}.xlsx

