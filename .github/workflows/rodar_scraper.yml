name: ScraperSTJHC Principal

on:
  schedule:
    - cron: '0 15 * * *'  # Execução diária, às 15:00 UTC
  workflow_dispatch:  # Permite disparar manualmente

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USUARIO }}
      EMAIL_PASS: ${{ secrets.EMAIL_SENHA }}
      EMAIL_DEST: ${{ secrets.EMAIL_DESTINATARIO_TESTE }}

    steps:
      # Etapa para fazer o checkout do repositório
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      # Configurar Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Instalar dependências
      - name: 📦 Instalar dependências
        run: |
          pip install -r requirements.txt
      
      # Criar a pasta onde os arquivos serão armazenados
      - name: 📁 Criar pasta dados_diarios se não existir
        run: mkdir -p dados_diarios
      
      # Restaurar cache de dados diários
      - name: 🗂️ Restaurar cache de dados diários
        uses: actions/cache@v3
        with:
          path: dados_diarios
          key: dados-diarios-${{ github.sha }}
          restore-keys: |
            dados-diarios-
      
      # Obter a data de ontem
      - name: 📅 Obter data de ontem
        id: data
        run: |
          ONTEM=$(date -d "yesterday" +"%d/%m/%Y")
          echo "ontem=$ONTEM" >> $GITHUB_OUTPUT
          echo "ontem_iso=$(date -d "yesterday" +"%Y-%m-%d")" >> $GITHUB_OUTPUT
          echo "ontem_fmt=$(date -d "yesterday" +"%d-%m-%Y")" >> $GITHUB_OUTPUT
          
      # Executar o script principal
      - name: 🔍 Executar script principal
        run: |
          python main.py "${{ steps.data.outputs.ontem }}"
          
      # Verificar se o arquivo foi gerado antes de tentar fazer o upload
      - name: 🔎 Verificar arquivo gerado
        run: |
          ls -l dados_diarios
          
      # Upload do arquivo Excel para o Supabase
      - name: ☁️ Upload do arquivo Excel para Supabase
        run: |
          python supabase/supabase_upload.py dados_diarios/hc_tjgo_${{ steps.data.outputs.ontem_fmt }}.xlsx hc_tjgo_${{ steps.data.outputs.ontem_fmt }}.xlsx
          
      # Gerar email de status
      - name: 📧 Gerar conteúdo do email
        id: gerar_email
        run: |
          if [ -f "email_subject.txt" ]; then
            echo "email_subject=$(cat email_subject.txt)" >> $GITHUB_OUTPUT
          else
            echo "email_subject=Resultados da checagem de HCs STJ/TJGO - ${{ steps.data.outputs.ontem }}" >> $GITHUB_OUTPUT
          fi
          
          if [ -f "email_body.txt" ]; then
            cat email_body.txt > email_body_content.txt
            echo "email_body=file://email_body_content.txt" >> $GITHUB_ENV
          else
            echo "Execução concluída em ${{ steps.data.outputs.ontem }}. Nenhuma notificação especial gerada." > email_body_content.txt
            echo "email_body=file://email_body_content.txt" >> $GITHUB_ENV
          fi
          
          if [ -f "attachment.txt" ] && [ -s "attachment.txt" ]; then
            echo "attachment_name=$(cat attachment.txt)" >> $GITHUB_OUTPUT
          else
            if [ -f "dados_diarios/hc_tjgo_${{ steps.data.outputs.ontem_fmt }}.xlsx" ]; then
              echo "attachment_name=dados_diarios/hc_tjgo_${{ steps.data.outputs.ontem_fmt }}.xlsx" >> $GITHUB_OUTPUT
            fi
          fi

      # Enviar e-mail
      - name: 📤 Enviar e-mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USUARIO }}
          password: ${{ secrets.EMAIL_SENHA }}
          subject: "${{ steps.gerar_email.outputs.email_subject }}"
          html_body: "${{ env.email_body }}"
          to: ${{ secrets.EMAIL_DESTINATARIO_TESTE }}
          from: "Checagem STJ HC <${{ secrets.EMAIL_USUARIO }}>"
          attachments: ${{ steps.gerar_email.outputs.attachment_name || '' }}
