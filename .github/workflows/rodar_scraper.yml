name: Rodar scraper e verificar retroativos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC = 08:00 Brasília

jobs:
  run-scraper:
    runs-on: ubuntu-24.04
    steps:
      - name: ⬇️ Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📅 Obter datas
        id: data
        run: |
          ONTEM=$(date -d 'yesterday' '+%d/%m/%Y')
          echo "ontem=$ONTEM" >> $GITHUB_OUTPUT
          echo "ontem_iso=$(date -d 'yesterday' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "anteontem_iso=$(date -d '2 days ago' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "hoje=$(date '+%d/%m/%Y')" >> $GITHUB_OUTPUT

      - name: 🗂️ Restaurar cache de dados diários
        uses: actions/cache@v3
        with:
          path: dados_diarios
          key: dados-diarios-${{ github.sha }}
          restore-keys: |
            dados-diarios-

      - name: ▶️ Rodar main.py com data de ontem
        run: |
          echo "Executando main.py para: ${{ steps.data.outputs.ontem }}"
          python main.py "${{ steps.data.outputs.ontem }}"

      - name: 🗂️ Salvar CSV como artefato
        uses: actions/upload-artifact@v3
        with:
          name: resultados-${{ steps.data.outputs.ontem_iso }}
          path: dados_diarios/*.csv

      - name: 🔎 Verificar retroativos
        run: |
          echo "Verificando HCs retroativos entre ${{ steps.data.outputs.anteontem_iso }} e ${{ steps.data.outputs.ontem_iso }}"
          python -c "
import pandas as pd
from datetime import datetime
from pathlib import Path
from retroativos.integrador import obter_retroativos
from retroativos.gerenciador_arquivos import salvar_csv_resultado
from email_detalhado import preparar_email_alerta_retroativos

# Executar verificação de retroativos
df_retroativos = obter_retroativos()

# Preparar conteúdo do email baseado nos resultados
preparar_email_alerta_retroativos(df_retroativos)
"

      - name: 📤 Enviar e-mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "${{ steps.gerar_email.outputs.email_subject || 'Relatório de HCs STJ (Origem TJGO)' }}"
          body: "${{ env.email_body || 'Execução concluída. Nenhuma notificação gerada.' }}"
          to: ${{ secrets.EMAIL_DEST }}
          from: "Scraper STJ HC <${{ secrets.EMAIL_USER }}>"
          attachments: ${{ steps.gerar_email.outputs.attachment_name || '' }}
