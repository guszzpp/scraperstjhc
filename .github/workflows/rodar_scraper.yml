# .github/workflows/pipeline_stjhc.yml

name: Pipeline HCs STJ/TJGO

on:
  schedule:
    - cron: '0 15 * * *'  # Diariamente às 12h (Brasília)
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  EMAIL_USER: ${{ secrets.EMAIL_USUARIO }}
  EMAIL_PASS: ${{ secrets.EMAIL_SENHA }}
  EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINATARIO_TESTE }}

jobs:
  diario:
    name: Scraper Diário
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependências
        run: pip install -r requirements.txt

      - name: 📁 Criar diretório de dados
        run: mkdir -p dados_diarios

      - name: 🗂️ Cache de dados diários
        uses: actions/cache@v3
        with:
          path: dados_diarios
          key: dados-diarios-${{ github.sha }}
          restore-keys: dados-diarios-

      - name: 📅 Definir datas (ontem)
        id: datas
        run: |
          ONTEM=$(date -d "yesterday" +"%d/%m/%Y")
          ONTEM_FMT=$(date -d "yesterday" +"%d-%m-%Y")
          echo "ontem=$ONTEM" >> $GITHUB_OUTPUT
          echo "ontem_fmt=$ONTEM_FMT" >> $GITHUB_OUTPUT

      - name: 🔍 Rodar scraper principal
        run: python main.py "${{ steps.datas.outputs.ontem }}"

      - name: 📂 Verificar arquivos e conteúdo do attachment.txt
        run: |
          echo "Arquivos gerados:"
          ls -l dados_diarios
          echo "Conteúdo de attachment.txt:"
          cat attachment.txt || echo "Arquivo attachment.txt ausente"
      
      - name: 📥 Upload Supabase (se disponível)
        run: |
          ARQ="dados_diarios/hc_tjgo_${{ steps.datas.outputs.ontem_fmt }}.xlsx"
          if [[ -f "$ARQ" ]]; then
            python supabase/supabase_upload.py "$ARQ" "$(basename "$ARQ")"
          else
            echo "Arquivo não gerado; pulando upload."
          fi

      - name: 📧 Gerar email
        id: email
        run: |
          SUBJECT=$(<email_subject.txt)
          BODY=$(<email_body.txt)
          ATTACHMENT=$(cat attachment.txt || true)

          echo "subject=$SUBJECT" >> $GITHUB_OUTPUT
          printf "body<<EOF\n%s\nEOF\n" "$BODY" >> $GITHUB_OUTPUT
          echo "attachment=$ATTACHMENT" >> $GITHUB_OUTPUT

      - name: 📧 Enviar email diário
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ env.EMAIL_USER }}
          password: ${{ env.EMAIL_PASS }}
          subject: "${{ steps.email.outputs.subject }}"
          html_body: "${{ steps.email.outputs.body }}"
          to: ${{ env.EMAIL_DESTINO }}
          from: "Checagem STJ HC <${{ env.EMAIL_USER }}>"
          attachments: "${{ steps.email.outputs.attachment }}"

  rechecagem:
    name: Rechecagem Retroativa
    needs: diario
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependências
        run: pip install -r requirements.txt

      - name: 📁 Criar diretório de dados
        run: mkdir -p dados_diarios

      - name: 📅 Definir datas (retroativas)
        id: datas_retro
        run: |
          ONTEM=$(date -d "yesterday" +"%d/%m/%Y")
          ONTEM_FMT=$(date -d "yesterday" +"%d-%m-%Y")
          ANTEONTEM=$(date -d "2 days ago" +"%d/%m/%Y")
          ANTEONTEM_FMT=$(date -d "2 days ago" +"%d-%m-%Y")

          echo "ontem=$ONTEM" >> $GITHUB_OUTPUT
          echo "ontem_fmt=$ONTEM_FMT" >> $GITHUB_OUTPUT
          echo "anteontem=$ANTEONTEM" >> $GITHUB_OUTPUT
          echo "anteontem_fmt=$ANTEONTEM_FMT" >> $GITHUB_OUTPUT

      - name: 🔄 Rodar rechecagem
        run: python retroativos/rechecagem.py "${{ steps.datas_retro.outputs.anteontem }}"

      - name: 📋 Preparar arquivo de rechecagem
        run: |
          ARQ_SAIDA="dados_diarios/rechecagem_hc_tjgo_${{ steps.datas_retro.outputs.ontem_fmt }}.xlsx"
          if grep -qx "true" tem_divergencia.txt; then
            cp "dados_diarios/hc_tjgo_${{ steps.datas_retro.outputs.ontem_fmt }}.xlsx" "$ARQ_SAIDA"
          else
            python supabase/criar_xlsx_vazio.py "$ARQ_SAIDA"
          fi

      - name: ☁️ Upload resultado retroativo
        run: |
          ARQ_SAIDA="dados_diarios/rechecagem_hc_tjgo_${{ steps.datas_retro.outputs.ontem_fmt }}.xlsx"
          python supabase/supabase_upload.py "$ARQ_SAIDA" "$(basename "$ARQ_SAIDA")"

      - name: 📧 Definir conteúdo do email retroativo
        id: email_retro
        run: |
          ARQ_SAIDA="dados_diarios/rechecagem_hc_tjgo_${{ steps.datas_retro.outputs.ontem_fmt }}.xlsx"
          if grep -qx "true" tem_divergencia.txt; then
            echo "subject=🚨 Divergência na rechecagem - ${{ steps.datas_retro.outputs.ontem }}" >> $GITHUB_OUTPUT
            echo "body=<p>Verificar anexo com divergências encontradas na rechecagem.</p>" >> $GITHUB_OUTPUT
            echo "attachment=$ARQ_SAIDA" >> $GITHUB_OUTPUT
          else
            echo "subject=ℹ️ Sem divergências na rechecagem - ${{ steps.datas_retro.outputs.ontem }}" >> $GITHUB_OUTPUT
            echo "body=<p>Prezados(as),</p><p>Nenhum novo Habeas Corpus retroativo (autuado em data anterior, mas só detectado hoje) foi localizado no STJ com origem no TJGO, na rechecagem realizada em <strong>${{ steps.datas_retro.outputs.ontem }}</strong> para o dia <strong>${{ steps.datas_retro.outputs.anteontem }}</strong>.</p><p>Este é um e-mail automático. Nenhuma ação é necessária.</p><p>Atenciosamente,<br>Sistema automatizado</p>" >> $GITHUB_OUTPUT
            echo "attachment=" >> $GITHUB_OUTPUT
          fi

      - name: 📧 Enviar email da rechecagem
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ env.EMAIL_USER }}
          password: ${{ env.EMAIL_PASS }}
          subject: "${{ steps.email_retro.outputs.subject }}"
          html_body: "${{ steps.email_retro.outputs.body }}"
          to: ${{ env.EMAIL_DESTINO }}
          from: "Rechecagem STJ HC <${{ env.EMAIL_USER }}>"
          attachments: "${{ steps.email_retro.outputs.attachment }}"
