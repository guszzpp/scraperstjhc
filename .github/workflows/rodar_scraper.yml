name: Rodar scraper e verificar retroativos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-scraper:
    runs-on: ubuntu-24.04
    steps:
      - name: ⬇️ Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📅 Obter datas
        id: data
        run: |
          ONTEM=$(date -d 'yesterday' '+%d/%m/%Y')
          echo "ontem=$ONTEM" >> $GITHUB_OUTPUT
          echo "ontem_iso=$(date -d 'yesterday' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "anteontem_iso=$(date -d '2 days ago' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "hoje=$(date '+%d/%m/%Y')" >> $GITHUB_OUTPUT

      - name: 🗂️ Restaurar cache de dados diários
        uses: actions/cache@v3
        with:
          path: dados_diarios
          key: dados-diarios-${{ steps.data.outputs.ontem_iso }}

      - name: ▶️ Rodar main.py com data de ontem
        run: |
          echo "Executando main.py para: ${{ steps.data.outputs.ontem }}"
          python main.py "${{ steps.data.outputs.ontem }}"

      - name: 🗂️ Salvar CSV como artefato
        uses: actions/upload-artifact@v3
        with:
          name: resultados-${{ steps.data.outputs.ontem_iso }}
          path: dados_diarios/*.csv

      - name: 💾 Salvar novo cache de dados diários
        uses: actions/cache@v3
        with:
          path: dados_diarios
          key: dados-diarios-${{ steps.data.outputs.ontem_iso }}

      - name: 🧪 Gerar conteúdo do e-mail
        id: gerar_email
        run: |
          if [[ ! -f email_subject.txt ]]; then
            echo "email_subject=✅ Relatório de HCs STJ (Origem TJGO) - ${{ steps.data.outputs.ontem }}" >> $GITHUB_OUTPUT
            echo "email_body<<EOF" >> $GITHUB_ENV
            echo "Nenhum novo Habeas Corpus retroativo (autuado em data anterior, mas só detectado hoje) foi localizado no STJ com origem no TJGO, na rechecagem realizada em ${{ steps.data.outputs.hoje }} para o dia ${{ steps.data.outputs.anteontem_iso }}." >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "attachment_name=" >> $GITHUB_OUTPUT
          else
            echo "email_subject=$(cat email_subject.txt)" >> $GITHUB_OUTPUT
            echo "email_body<<EOF" >> $GITHUB_ENV
            cat email_body.txt >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "attachment_name=$(cat attachment.txt || echo '')" >> $GITHUB_OUTPUT
          fi

      - name: 📤 Enviar e-mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: ${{ steps.gerar_email.outputs.email_subject }}
          body: ${{ env.email_body }}
          to: ${{ secrets.EMAIL_DEST }}
          from: Scraper STJ HC <${{ secrets.EMAIL_USER }}>
          attachments: ${{ steps.gerar_email.outputs.attachment_name }}
