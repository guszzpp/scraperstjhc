name: Rodar scraper STJ – rechecagem retroativa

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - uses: actions/checkout@v4

      # 2. Configurar Python
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Instalar dependências
      - name: 📦 Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "::error::Arquivo requirements.txt não encontrado!"
            exit 1
          fi

      # 4. Definir as datas
      - name: 📅 Definir datas
        id: datas
        run: |
          ONTEM=$(date -d 'yesterday' '+%d/%m/%Y')
          ONTEM_ISO=$(date -d 'yesterday' '+%Y-%m-%d')
          ANTEONTEM_ISO=$(date -d '2 days ago' '+%Y-%m-%d')
          echo "ontem=$ONTEM"            >> $GITHUB_OUTPUT
          echo "ontem_iso=$ONTEM_ISO"    >> $GITHUB_OUTPUT
          echo "anteontem_iso=$ANTEONTEM_ISO" >> $GITHUB_OUTPUT

      # 5. Preparar pasta de históricos
      - name: 📁 Preparar pasta dados_diarios
        run: mkdir -p dados_diarios

      # 6. Restaurar CSV de anteontem do cache
      - name: 📂 Restaurar CSV de anteontem
        uses: actions/cache@v3
        with:
          path: dados_diarios
          key: dados-diarios-${{ steps.datas.outputs.anteontem_iso }}
          restore-keys: dados-diarios-

      # 7. Rodar todo o fluxo no main.py (scraper → CSV → comparação → geração de e‑mail)
      - name: 🚀 Rodar scraper e preparar e‑mail
        run: |
          echo "Executando main.py para: ${{ steps.datas.outputs.ontem }}"
          python main.py "${{ steps.datas.outputs.ontem }}"

      # 8. Salvar CSV de ontem no cache para o próximo run
      - name: 💾 Cache CSV de ontem
        uses: actions/cache@v3
        with:
          path: dados_diarios
          key: dados-diarios-${{ steps.datas.outputs.ontem_iso }}

      # 9. Preparar variáveis de e‑mail a partir dos arquivos gerados
      - name: 📄 Preparar dados do e‑mail
        id: montar_corpo
        run: |
          SUBJECT=$(cat email_subject.txt)
          BODY=$(cat email_body.txt)
          ATTACHMENT=$(cat attachment.txt || echo "")
          echo "email_subject=$SUBJECT" >> $GITHUB_OUTPUT
          echo "email_body<<EOF"        >> $GITHUB_ENV
          echo "$BODY"                  >> $GITHUB_ENV
          echo "EOF"                    >> $GITHUB_ENV
          echo "attachment_name=$ATTACHMENT" >> $GITHUB_OUTPUT

      # 10. Enviar o e‑mail
      - name: 📤 Enviar E‑mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USUARIO }}
          password: ${{ secrets.EMAIL_SENHA }}
          subject: ${{ steps.montar_corpo.outputs.email_subject }}
          body: ${{ env.email_body }}
          to: ${{ secrets.EMAIL_DESTINATARIO_TESTE }}
          from: Automação STJ <${{ secrets.EMAIL_USUARIO }}>
          attachments: ${{ steps.montar_corpo.outputs.attachment_name && format('{0}/{1}', github.workspace, steps.montar_corpo.outputs.attachment_name) || '' }}
